<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Short n' Sweet Slots</title>
  <style>
    :root {
      --bg: #120714;
      --text: #fff6fc;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }
    body { min-height: 100vh; }
    .app {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      background: #120714 center/cover no-repeat;
    }
    .screen-wrap {
      position: relative;
      width: min(100vw, 1920px);
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      background: #120714;
    }
    .bg-layer, .overlay-layer, .transition-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .bg-layer { object-fit: cover; }
    .overlay-layer { object-fit: contain; }
    .transition-layer {
      object-fit: cover;
      display: none;
      z-index: 20;
      background: transparent;
    }
    .reels-region {
      position: absolute;
      left: 9.375%;
      top: 11.111%;
      width: 62.5%;
      height: 66.667%;
      overflow: hidden;
      z-index: 4;
    }
    .luck-video {
      position: absolute;
      left: 9.375%;
      top: 11.111%;
      width: 62.5%;
      height: 66.667%;
      object-fit: fill;
      display: none;
      z-index: 8;
      pointer-events: none;
    }
    .reels-bg, .reels-fg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
    }
    .reels-fg { z-index: 9; }
    .reels-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 6;
    }
    .reels-border {
      position: absolute;
      left: 6.25%;
      top: 5.556%;
      width: 68.75%;
      height: 77.778%;
      object-fit: fill;
      z-index: 10;
      pointer-events: none;
    }
    .jackpot-bg {
      position: absolute;
      left: 75%;
      top: 5.556%;
      width: 18.75%;
      height: 55.556%;
      object-fit: fill;
      z-index: 3;
      pointer-events: none;
    }
    .hud {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }
    .hud * { pointer-events: auto; }

    .pink-text {
      color: #ff66c4;
      font-weight: 800;
      text-shadow: 2px 2px 0 #000;
      user-select: none;
    }
    .value-box {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      text-shadow: 2px 2px 0 #000;
      user-select: none;
      text-align: center;
    }
    .btn {
      position: absolute;
      border: 0;
      border-radius: 16px;
      background: rgba(45, 16, 57, 0.72);
      color: #fff;
      font-weight: 800;
      text-shadow: 1px 1px 0 #000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 8px 20px rgba(0,0,0,0.25);
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
      backdrop-filter: blur(3px);
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .spin-btn {
      background: linear-gradient(180deg, #ff66c4, #b72e7f);
      color: #180713;
      font-size: clamp(18px, 2vw, 34px);
    }
    .small-btn { font-size: clamp(12px, 1.1vw, 20px); }

    .message-banner {
      position: absolute;
      left: 50%;
      bottom: 4%;
      transform: translateX(-50%);
      min-width: 40%;
      max-width: 80%;
      padding: 12px 20px;
      background: rgba(0,0,0,0.78);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      font-size: clamp(16px, 1.4vw, 24px);
      font-weight: 800;
      text-align: center;
      display: none;
      z-index: 16;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
    }

    /* Fixed: visible overlay but does NOT block clicking SPIN */
    .fullscreen-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      z-index: 18;
      pointer-events: none;
    }
    .overlay-card {
      background: rgba(19, 7, 27, 0.92);
      border: 2px solid rgba(255,213,79,0.45);
      border-radius: 28px;
      padding: 24px 28px;
      text-align: center;
      max-width: min(900px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      pointer-events: none;
    }
    .overlay-card .big {
      font-size: clamp(28px, 3vw, 52px);
      color: #ff66c4;
      font-weight: 900;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 8px;
    }
    .overlay-card .small {
      font-size: clamp(16px, 1.4vw, 26px);
      font-weight: 700;
      text-shadow: 2px 2px 0 #000;
    }

    .info-modal {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 25;
      pointer-events: auto;
    }
    .info-content {
      position: relative;
      width: min(1200px, 84vw);
      height: min(760px, 70vh);
      background: rgba(15,8,20,0.92);
      border-radius: 26px;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .info-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .modal-close, .modal-toggle {
      position: absolute;
      padding: 10px 16px;
      border-radius: 14px;
      border: 0;
      background: rgba(45,16,57,0.86);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      z-index: 2;
    }
    .modal-close { top: 14px; right: 14px; }
    .modal-toggle { bottom: 18px; left: 50%; transform: translateX(-50%); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.84);
      color: white;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 14px 18px;
      text-align: center;
      font-weight: 700;
      min-width: min(800px, 90vw);
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 40;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .asset-warning {
      position: absolute;
      top: 1.2%;
      right: 1.2%;
      max-width: 28%;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,99,132,0.35);
      border-radius: 14px;
      padding: 10px 12px;
      z-index: 30;
      display: none;
      font-size: 12px;
      line-height: 1.35;
      color: #ffd7e5;
      pointer-events: none;
      white-space: pre-wrap;
    }
    .asset-warning strong {
      color: #ff8fbf;
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="screen-wrap" id="screenWrap">
      <img class="bg-layer" id="mainBg" src="Assets/Ui/MainBackground.png" alt="" />
      <img class="jackpot-bg" id="jackpotBg" src="Assets/Ui/JackpotBackground.png" alt="" />

      <div class="reels-region" id="reelsRegion">
        <img class="reels-bg" id="reelsBg" src="Assets/Ui/ReelsBackground.png" alt="" />
        <canvas class="reels-canvas" id="reelsCanvas" width="1200" height="720"></canvas>
        <img class="reels-fg" id="reelsFg" src="Assets/Ui/ReelsForeground.png" alt="" />
      </div>

      <video class="luck-video" id="luckVideo" preload="auto" playsinline muted>
        <source src="Assets/TransitionOverlaysVideos/LuckHasArrived.mp4" type="video/mp4" />
      </video>

      <img class="reels-border" id="reelsBorder" src="Assets/Ui/ReelsBorderLines.png" alt="" />

      <div class="hud" id="hud">
        <div class="value-box pink-text" style="left:31.25%; top:0%; width:18.75%; height:5.556%; font-size:clamp(18px,2vw,34px);" id="winBox">WIN $0.00</div>

        <div class="value-box pink-text" style="left:9.375%; top:83.333%; width:12.5%; height:5.556%; font-size:clamp(14px,1.2vw,22px);">BET</div>
        <button class="btn small-btn" id="betMinusBtn" style="left:9.375%; top:88.889%; width:3.125%; height:5.556%;">-</button>
        <div class="value-box" id="betAmount" style="left:12.5%; top:88.889%; width:6.25%; height:5.556%; font-size:clamp(14px,1.3vw,22px);">$0.50</div>
        <button class="btn small-btn" id="betPlusBtn" style="left:18.75%; top:88.889%; width:3.125%; height:5.556%;">+</button>

        <div class="value-box pink-text" style="left:25%; top:83.333%; width:12.5%; height:5.556%; font-size:clamp(14px,1.2vw,22px);">BALANCE</div>
        <div class="value-box" id="balanceAmount" style="left:25%; top:88.889%; width:12.5%; height:5.556%; font-size:clamp(14px,1.3vw,22px);">$100.00</div>

        <button class="btn small-btn" id="gameInfoBtn" style="left:40.625%; top:83.333%; width:12.5%; height:5.556%;">GAME INFO</button>
        <button class="btn small-btn" id="paytableBtn" style="left:40.625%; top:88.889%; width:12.5%; height:5.556%;">PAYTABLE</button>
        <button class="btn small-btn" id="linesBtn" style="left:56.25%; top:83.333%; width:12.5%; height:5.556%;">LINES</button>
        <button class="btn small-btn" id="collectBtn" style="left:56.25%; top:88.889%; width:12.5%; height:5.556%;">COLLECT</button>

        <button class="btn spin-btn" id="spinBtn" style="left:78.125%; top:66.667%; width:15.625%; height:16.667%;">SPIN</button>
        <button class="btn small-btn" id="denomBtn" style="left:93.75%; top:88.889%; width:6.25%; height:11.111%;">1¢</button>

        <div class="value-box pink-text" style="left:78.125%; top:11.111%; width:12.5%; height:5.556%; font-size:clamp(18px,1.4vw,26px);">GRAND</div>
        <div class="value-box" id="grandAmount" style="left:78.125%; top:16.667%; width:12.5%; height:5.556%; font-size:clamp(16px,1.35vw,24px);"></div>
        <div class="value-box pink-text" style="left:78.125%; top:22.222%; width:12.5%; height:5.556%; font-size:clamp(18px,1.4vw,26px);">MAJOR</div>
        <div class="value-box" id="majorAmount" style="left:78.125%; top:27.778%; width:12.5%; height:5.556%; font-size:clamp(16px,1.35vw,24px);"></div>
        <div class="value-box pink-text" style="left:78.125%; top:33.333%; width:12.5%; height:5.556%; font-size:clamp(18px,1.4vw,26px);">MINOR</div>
        <div class="value-box" id="minorAmount" style="left:78.125%; top:38.889%; width:12.5%; height:5.556%; font-size:clamp(16px,1.35vw,24px);"></div>
        <div class="value-box pink-text" style="left:78.125%; top:44.444%; width:12.5%; height:5.556%; font-size:clamp(18px,1.4vw,26px);">MINI</div>
        <div class="value-box" id="miniAmount" style="left:78.125%; top:50%; width:12.5%; height:5.556%; font-size:clamp(16px,1.35vw,24px);"></div>
      </div>

      <div class="message-banner" id="messageBanner"></div>

      <div class="fullscreen-overlay" id="fullscreenOverlay">
        <div class="overlay-card">
          <div class="big" id="overlayBig"></div>
          <div class="small" id="overlaySmall"></div>
        </div>
      </div>

      <div class="info-modal" id="infoModal">
        <div class="info-content">
          <button class="modal-close" id="modalCloseBtn">Close</button>
          <button class="modal-toggle" id="modalToggleBtn">Next Page</button>
          <img class="info-image" id="infoImage" src="Assets/Ui/GameInfo1.png" alt="" />
        </div>
      </div>

      <video class="transition-layer" id="transitionVideo" preload="auto" playsinline></video>
      <img class="overlay-layer" id="bonusStill" src="Assets/TransitionOverlays/Pictures/Bonusin.png" alt="" style="display:none; z-index:19;" />
      <div class="asset-warning" id="assetWarning"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <audio id="sndDing" preload="auto" src="Assets/Sounds/ding.wav"></audio>
  <audio id="sndDun" preload="auto" src="Assets/Sounds/dun.wav"></audio>
  <audio id="sndRing" preload="auto" src="Assets/Sounds/ring.wav"></audio>
  <audio id="sndTryThis" preload="auto" src="Assets/Sounds/HaveYouEverTriedThisOne.wav"></audio>
  <audio id="sndOhBoy" preload="auto" src="Assets/Sounds/ohboy.wav"></audio>
  <audio id="sndOhHey" preload="auto" src="Assets/Sounds/OhHEY.wav"></audio>
  <audio id="sndTakeACouple" preload="auto" src="Assets/Sounds/TakeACoupleBucks.wav"></audio>

  <script src="slot.js"></script>
</body>
</html>
