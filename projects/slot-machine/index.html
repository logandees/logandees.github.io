<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Short n' Sweet Slots</title>
  <style>
    :root {
      --bg: #120714;
      --text: #fff6fc;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }
    body { min-height: 100vh; }

    .app {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      background: #120714 center/cover no-repeat;
    }

    .screen-wrap {
      position: relative;
      width: min(100vw, 1920px);
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      background: #120714;
    }

    .bg-layer, .overlay-layer, .transition-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .bg-layer { object-fit: cover; }
    .overlay-layer { object-fit: contain; }

    .transition-layer {
      object-fit: cover;
      display: none;
      z-index: 20;
      background: transparent;
    }

    .reels-region {
      position: absolute;
      left: 9.375%;
      top: 11.111%;
      width: 62.5%;
      height: 66.667%;
      overflow: hidden;
      z-index: 4;
    }

    .luck-video {
      position: absolute;
      left: 9.375%;
      top: 11.111%;
      width: 62.5%;
      height: 66.667%;
      object-fit: fill;
      display: none;
      z-index: 8;
      pointer-events: none;
    }

    .reels-bg, .reels-fg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
    }

    .reels-fg { z-index: 9; }

    .reels-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 6;
    }

    .reels-border {
      position: absolute;
      left: 6.25%;
      top: 5.556%;
      width: 68.75%;
      height: 77.778%;
      object-fit: fill;
      z-index: 10;
      pointer-events: none;
    }

    .jackpot-bg {
      position: absolute;
      left: 75%;
      top: 5.556%;
      width: 18.75%;
      height: 55.556%;
      object-fit: fill;
      z-index: 3;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }

    .hud * { pointer-events: auto; }

    .pink-text {
      color: #ff66c4;
      font-weight: 800;
      text-shadow: 2px 2px 0 #000;
      user-select: none;
    }

    .value-box {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      text-shadow: 2px 2px 0 #000;
      user-select: none;
      text-align: center;
    }

    .btn {
      position: absolute;
      border: 0;
      border-radius: 16px;
      background: rgba(45, 16, 57, 0.72);
      color: #fff;
      font-weight: 800;
      text-shadow: 1px 1px 0 #000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 8px 20px rgba(0,0,0,0.25);
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
      backdrop-filter: blur(3px);
    }

    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spin-btn {
      background: linear-gradient(180deg, #ff66c4, #b72e7f);
      color: #180713;
      font-size: clamp(18px, 2vw, 34px);
    }

    .small-btn { font-size: clamp(12px, 1.1vw, 20px); }

    .message-banner {
      position: absolute;
      left: 50%;
      bottom: 4%;
      transform: translateX(-50%);
      min-width: 40%;
      max-width: 80%;
      padding: 12px 20px;
      background: rgba(0,0,0,0.78);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      font-size: clamp(16px, 1.4vw, 24px);
      font-weight: 800;
      text-align: center;
      display: none;
      z-index: 16;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
    }

    .fullscreen-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      z-index: 18;
      pointer-events: none;
    }

    .overlay-card {
      background: rgba(19, 7, 27, 0.92);
      border: 2px solid rgba(255,213,79,0.45);
      border-radius: 28px;
      padding: 24px 28px;
      text-align: center;
      max-width: min(900px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      pointer-events: none;
    }

    .overlay-card .big {
      font-size: clamp(28px, 3vw, 52px);
      color: #ff66c4;
      font-weight: 900;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 8px;
    }

    .overlay-card .small {
      font-size: clamp(16px, 1.4vw, 26px);
      font-weight: 700;
      text-shadow: 2px 2px 0 #000;
    }

    .info-modal {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.72);
      z-index: 30;
      pointer-events: auto;
    }

    .info-content {
      position: relative;
      width: 90%;
      height: 90%;
      background: rgba(15,8,20,0.94);
      border-radius: 26px;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .info-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #120714;
    }

    .fallback-wrap {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #120714;
    }

    .fallback-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #120714;
    }

    .modal-controls {
      position: absolute;
      right: 16px;
      top: 16px;
      display: flex;
      gap: 10px;
      z-index: 32;
    }

    .modal-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 6%;
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(0,0,0,0.76);
      color: #fff;
      font-weight: 700;
      font-size: clamp(14px, 1.1vw, 18px);
      display: none;
      z-index: 40;
      text-align: center;
      max-width: 72%;
    }

    .asset-warning {
      position: fixed;
      left: 12px;
      bottom: 12px;
      max-width: min(700px, 90vw);
      white-space: pre-wrap;
      background: rgba(0,0,0,0.85);
      color: #ffd5d5;
      border: 1px solid rgba(255,120,120,0.4);
      border-radius: 12px;
      padding: 12px 14px;
      font: 12px/1.35 monospace;
      z-index: 9999;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen-wrap" id="screenWrap">
      <img class="bg-layer" id="mainBg" src="Assets/Ui/FinalBackground.png" alt="Background" />
      <video class="transition-layer" id="transitionVideo" preload="auto" playsinline muted></video>

      <div class="reels-region" id="reelsRegion">
        <img class="reels-bg" id="reelsBg" src="Assets/Ui/BackgroundCover.png" alt="" />
        <canvas class="reels-canvas" id="reelsCanvas"></canvas>
        <video class="luck-video" id="luckVideo" preload="auto" playsinline muted>
          <source src="Assets/TransitionOverlaysVideos/LuckHasArrived.mp4" type="video/mp4" />
        </video>
        <img class="reels-fg" id="reelsFg" src="Assets/Ui/ForegroundCover.png" alt="" />
      </div>

      <img class="reels-border" id="reelsBorder" src="Assets/Ui/SpinBackgroundNoReels.png" alt="" />
      <img class="jackpot-bg" id="jackpotBg" src="Assets/Ui/JackpotBackground.png" alt="" />

      <div class="hud">
        <div class="pink-text" style="position:absolute; left:77.5%; top:9.4%; font-size:clamp(16px,1.2vw,22px);">GRAND</div>
        <div class="value-box" id="grandAmount" style="left:77.2%; top:13.8%; width:14.8%; height:5.1%; font-size:clamp(18px,1.4vw,24px);"></div>

        <div class="pink-text" style="position:absolute; left:77.5%; top:22.8%; font-size:clamp(16px,1.2vw,22px);">MAJOR</div>
        <div class="value-box" id="majorAmount" style="left:77.2%; top:27.2%; width:14.8%; height:5.1%; font-size:clamp(18px,1.4vw,24px);"></div>

        <div class="pink-text" style="position:absolute; left:77.5%; top:36.2%; font-size:clamp(16px,1.2vw,22px);">MINOR</div>
        <div class="value-box" id="minorAmount" style="left:77.2%; top:40.6%; width:14.8%; height:5.1%; font-size:clamp(18px,1.4vw,24px);"></div>

        <div class="pink-text" style="position:absolute; left:77.5%; top:49.7%; font-size:clamp(16px,1.2vw,22px);">MINI</div>
        <div class="value-box" id="miniAmount" style="left:77.2%; top:54%; width:14.8%; height:5.1%; font-size:clamp(18px,1.4vw,24px);"></div>

        <div class="pink-text" style="position:absolute; left:11.8%; top:82.2%; font-size:clamp(14px,1.1vw,20px);">BALANCE</div>
        <div class="value-box" id="balanceAmount" style="left:9.4%; top:85.6%; width:12.8%; height:5.1%; font-size:clamp(18px,1.5vw,26px);"></div>

        <div class="pink-text" style="position:absolute; left:26.2%; top:82.2%; font-size:clamp(14px,1.1vw,20px);">BET</div>
        <div class="value-box" id="betAmount" style="left:23.8%; top:85.6%; width:12.8%; height:5.1%; font-size:clamp(18px,1.5vw,26px);"></div>

        <div class="pink-text" style="position:absolute; left:41.6%; top:82.2%; font-size:clamp(14px,1.1vw,20px);">WIN</div>
        <div class="value-box" id="winBox" style="left:38.8%; top:85.6%; width:16%; height:5.1%; font-size:clamp(18px,1.5vw,26px);"></div>

        <button class="btn small-btn" id="denomBtn" style="left:56.8%; top:84%; width:8.5%; height:6.5%;">DENOM</button>
        <button class="btn small-btn" id="betMinusBtn" style="left:66.2%; top:84%; width:4.8%; height:6.5%;">-</button>
        <button class="btn small-btn" id="betPlusBtn" style="left:71.7%; top:84%; width:4.8%; height:6.5%;">+</button>

        <button class="btn small-btn" id="gameInfoBtn" style="left:77.2%; top:63.8%; width:14.8%; height:5.8%;">GAME INFO</button>
        <button class="btn small-btn" id="paytableBtn" style="left:77.2%; top:70.6%; width:14.8%; height:5.8%;">PAYTABLE</button>

        <button class="btn small-btn" id="collectBtn" style="left:6.9%; top:92.5%; width:11%; height:5.5%;">COLLECT</button>
        <button class="btn small-btn" id="linesBtn" style="left:20.4%; top:92.5%; width:11%; height:5.5%;">LINES</button>
        <button class="btn spin-btn" id="spinBtn" style="left:72.5%; top:91.4%; width:19.5%; height:6.2%;">SPIN</button>
      </div>

      <div class="message-banner" id="messageBanner"></div>

      <div class="fullscreen-overlay" id="fullscreenOverlay">
        <div class="overlay-card">
          <div class="big" id="overlayBig"></div>
          <div class="small" id="overlaySmall"></div>
        </div>
      </div>

      <div class="info-modal" id="infoModal">
        <div class="info-content">
          <div class="modal-controls">
            <button class="modal-btn" id="modalToggleBtn">NEXT PAGE</button>
            <button class="modal-btn" id="modalCloseBtn">CLOSE</button>
          </div>
          <iframe class="info-frame" id="gameInfoFrame" title="Game Information"></iframe>
          <div class="fallback-wrap" id="gameInfoFallback">
            <img id="fallbackPageImage" src="Assets/Ui/GameInfo1.png" alt="Game information" />
          </div>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>
  </div>

  <div class="asset-warning" id="assetWarning"></div>

  <script src="slot.js"></script>
</body>
</html>
